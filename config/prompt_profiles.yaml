default_profile: baseline_structured
pstar_profile: baseline_structured

profiles:
  # ── Active default / P* candidate ───────────────────────────────────────────
  # All Phase 2+ runs use this unless overridden. Update pstar_profile above
  # once Phase 1 results identify the winning combination.
  baseline_structured:
    few_shot_count: 0
    prompt_length_mode: detailed
    reasoning_instruction: true
    output_format_mode: structured
    temperature: 0.0
    role_framing: expert

  # ── Phase 1 — OFAT prompt ablation ──────────────────────────────────────────
  # Anchor (AB-00). Every Phase 1 run differs from this by exactly one variable so
  # effects are attributable. The anchor uses the FULL prompts (prompt_length_mode:
  # detailed); only AB-03 (phase1_length_only) swaps to the caveman-compressed
  # PROMPT_*.concise.md variants. AB-01/AB-02 reuse this profile and vary only the
  # generation+repair temperature via ablation_configs/phase1-temperature-*.json.
  phase1_zero_baseline:
    few_shot_count: 0
    prompt_length_mode: detailed
    reasoning_instruction: false
    output_format_mode: strict
    temperature: 0.0
    role_framing: neutral

  # AB-04: role framing only (neutral → expert)
  phase1_role_only:
    few_shot_count: 0
    prompt_length_mode: detailed
    reasoning_instruction: false
    output_format_mode: strict
    temperature: 0.0
    role_framing: expert

  # AB-05: few-shot only (0 → 2). Each phase injects 2 full worked <example> demos
  # (real output shapes: selected_files lists, classification YAML, RUN-step Dockerfile
  # bodies, repair patches, INSTALL.md), loaded from prompts/PROMPT_*_FEWSHOT.md — see
  # _FEWSHOT_FILES in core/prompt_profiles.py.
  phase1_few_shot_only:
    few_shot_count: 2
    prompt_length_mode: detailed
    reasoning_instruction: false
    output_format_mode: strict
    temperature: 0.0
    role_framing: neutral

  # AB-03: prompt verbosity only (full → caveman-compressed). concise loads the
  # PROMPT_*.concise.md variants via prompt_path(); this is the ONLY profile that
  # does so. The .concise.md files are generated once, offline, via the
  # /caveman-compress methodology and committed as static files — never at runtime.
  phase1_length_only:
    few_shot_count: 0
    prompt_length_mode: concise
    reasoning_instruction: false
    output_format_mode: strict
    temperature: 0.0
    role_framing: neutral